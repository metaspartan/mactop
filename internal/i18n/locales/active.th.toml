Help_FullText = """
mactop เป็นเครื่องมือตรวจสอบโอเพนซอร์สสำหรับ Apple Silicon สร้างโดย Carsen Klock ด้วย Go!

คลังโค้ด: github.com/metaspartan/mactop

----การตั้งค่าปัจจุบัน----
Prometheus Metrics: %s
เวอร์ชัน: %s
เลย์เอาท์: %s
สีตัวอักษร: %s
สีพื้นหลัง: %s
ช่วงรีเฟรช: %dms

----การควบคุม----
- r: รีเฟรชข้อมูล UI ด้วยตนเอง
- c: เปลี่ยนธีมสี
- b: เปลี่ยนสีพื้นหลัง
- p: โหมดปาร์ตี้ (วนสี)
- l: สลับ 18 เลย์เอาท์
- i: แสดง/ซ่อนแผงข้อมูล
- Shift + F: ควบคุมพัดลมและแผงความร้อน
- F9: สิ้นสุดโปรเซสที่เลือก (ใ/ม)
- f: หยุดรายการโปรเซส
- /: ค้นหาโปรเซส
- g/G: ไปที่ด้านบน/ล่างของรายการ
- + หรือ -: ปรับช่วงรีเฟรช
- h หรือ ?: แสดง/ซ่อนเมนูช่วยเหลือ
- j/k หรือ ↓/↑: เลื่อนข้อความ
- q หรือ <C-c>: ออกจากแอป

----ตัวเลือกการเริ่มต้น----
--help, -h: แสดงเมนูช่วยเหลือ
--version, -v: แสดงเวอร์ชัน
--interval, -i: ช่วงรีเฟรช (มิลลิวินาที) ค่าเริ่มต้น: 1000
--prometheus, -p: พอร์ต Prometheus metrics
--headless: โหมดไม่มีหน้าจอ (ส่งออกไป stdout)
--format: รูปแบบเอาต์พุต (json, yaml, xml, csv, toon)
--pretty: เอาต์พุตจัดรูปแบบ
--count: จำนวนตัวอย่าง (0 = ไม่จำกัด)
--dump-ioreport, -d: แสดงทุกช่อง IOReport
--unit-network: หน่วยเครือข่าย: auto, byte, kb, mb, gb
--unit-disk: หน่วยดิสก์: auto, byte, kb, mb, gb
--unit-temp: หน่วยอุณหภูมิ: celsius, fahrenheit
--foreground: สีตัวอักษร UI
--bg: สีพื้นหลัง UI
--pid: ตรวจสอบ PID เฉพาะ (--pid 1234)
--fan-control: ควบคุมพัดลมแบบโต้ตอบ (SMC)*
--menubar: โหมดแถบเมนู macOS

ไฟล์ธีม: สร้าง theme.json ใน $XDG_CONFIG_HOME/mactop หรือ ~/.mactop สำหรับสีที่กำหนดเอง
"""

