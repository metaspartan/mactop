Help_FullText = """
mactopはCarsen KlockによってGo言語で開発されたApple Silicon用オープンソース監視ツールです！

リポジトリ: github.com/metaspartan/mactop

----現在の設定----
Prometheusメトリクス: %s
バージョン: %s
レイアウト: %s
文字色: %s
背景色: %s
更新間隔: %dms

----操作方法----
- r: UIデータを手動で更新
- c: UIカラーテーマを変更
- b: UI背景色を変更
- p: パーティーモード（カラーサイクル）切替
- l: 18種類のレイアウトを切り替え
- i: 情報画面の表示切替
- Shift + F: ファン制御＆熱レイアウト表示
- F9: 選択したプロセスを強制終了 (y/n確認)
- f: プロセスリストを固定
- /: プロセス検索
- g/G: 一番上/一番下へ移動
- + / -: 更新間隔を調整（早く/遅く）
- h / ?: ヘルプメニュー表示切替
- j/k または ↓/↑: スクロール
- q または <C-c>: アプリケーション終了

----起動オプション----
--help, -h: ヘルプ表示
--version, -v: バージョン表示
--interval, -i: 更新間隔(ms)。デフォルト1000。
--prometheus, -p: Prometheusメトリクスポート設定 (--prometheus=9090)
--headless: UIなしのヘッドレスモード (stdoutへ出力)
--format: ヘッドレスの出力形式 (json, yaml, xml, csv, toon)
--pretty: ヘッドレスでの整形出力
--count: ヘッドレスでの取得回数 (0 = 無限)
--dump-ioreport, -d: 全IOReportチャンネルを出力して終了
--unit-network: ネットワーク単位 (auto, byte, kb, mb, gb)
--unit-disk: ディスク単位 (auto, byte, kb, mb, gb)
--unit-temp: 温度単位 (celsius, fahrenheit)
--foreground: UI文字色設定
--bg: UI背景色設定
--pid: 特定プロセスの監視 (--pid 1234)
--fan-control: インタラクティブなファン速度制御 (SMC変更)*
--menubar: macOSメニューバーステータス項目モード

テーマファイル設定：色変更は $XDG_CONFIG_HOME/mactop または ~/.mactop に theme.json を作成してください
"""

