Help_FullText = """
mactop é uma ferramenta open source de monitoramento para Apple Silicon feita por Carsen Klock em Go!

Repo: github.com/metaspartan/mactop

----Configurações Atuais----
Métricas Prometheus: %s
Versão: %s
Layout: %s
Cor Primária: %s
Cor de Fundo: %s
Intervalo: %dms

----Controles----
- r: Atualizar
- c: Mudar tema
- b: Mudar cor de fundo
- p: Modo Festa
- l: Alternar entre layouts
- i: Ativar as Informações
- Shift + F: Ventiladores & Temperatura
- F9: Matar processo (s/n)
- f: Congelar lista
- /: Pesquisar PID
- g/G: Topo / Final
- + / -: Intervalo de atualizar
- h / ?: Mostrar ajuda
- j/k ou ↓/↑: Rolar ajuda
- q ou <C-c>: Sair

----Linha de Comando----
--help, -h: Mostrar ajuda
--version, -v: Versão
--interval, -i: Ms p/ atualizar (1000)
--prometheus, -p: Ativar métricas Prometheus
--headless: Modo script
--format: (json, yaml, etc.)
--pretty: Impressão formatada
--count: N amostras
--dump-ioreport, -d: Despejar IOReport
--unit-network: Unidade
--unit-disk: Unidade I/O
--unit-temp: celsius / fahrenheit
--foreground: Cor
--bg: Fundo
--pid: --pid 123
--fan-control: Controle da ventoinha (SMC)*
--menubar: Barra de Menus macOS

Crie ~/.mactop/theme.json para cores customizadas!
"""

